<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Game Admin</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div id="app">
    <!-- Login -->
    <div id="login-section">
      <h1>Dino Game Admin</h1>
      <form id="login-form">
        <input type="password" id="password-input" placeholder="비밀번호" autocomplete="current-password">
        <button type="submit">로그인</button>
      </form>
      <p id="login-error" class="error hidden"></p>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" class="hidden">
      <header>
        <h1>Dino Game Admin</h1>
        <button id="logout-btn">로그아웃</button>
      </header>

      <nav class="tabs">
        <button class="tab active" data-tab="ranking">랭킹 관리</button>
        <button class="tab" data-tab="sprites">이미지 관리</button>
        <button class="tab" data-tab="settings">게임 설정</button>
      </nav>

      <!-- Ranking Tab -->
      <section id="tab-ranking" class="tab-content active">
        <h2>랭킹 관리</h2>
        <table id="ranking-table">
          <thead>
            <tr>
              <th>순위</th>
              <th>이름</th>
              <th>연락처</th>
              <th>점수</th>
              <th>등록일</th>
              <th>작업</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <!-- Sprites Tab -->
      <section id="tab-sprites" class="tab-content hidden">
        <h2>이미지 관리</h2>
        <div id="sprites-grid"></div>
      </section>

      <!-- Settings Tab -->
      <section id="tab-settings" class="tab-content hidden">
        <h2>게임 설정</h2>
        <div class="setting-row">
          <label for="happy-ending-score">해피엔딩 트리거 점수</label>
          <input type="number" id="happy-ending-score" step="50" min="0">
          <button id="save-settings-btn">저장</button>
        </div>
        <p id="settings-status" class="hidden"></p>
      </section>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
